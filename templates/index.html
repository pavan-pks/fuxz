<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebFuzz</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/build/three.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body,
    html {
      background: #000;
      color: #fff;
      font-family: 'Inter', sans-serif;
      height: 100%;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    #canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    .cursor {
      width: 40px;
      height: 40px;
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 50%;
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      transition: transform 0.15s ease-out;
      display: none;
    }

    .cursor-dot {
      width: 4px;
      height: 4px;
      background: #fff;
      border-radius: 50%;
      position: fixed;
      pointer-events: none;
      z-index: 10000;
      display: none;
    }

    .app {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 40px;
      overflow-y: auto;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
      transform: translateZ(0);
      transition: transform 0.3s ease-out;
    }

    .logo {
      font-size: 20px;
      font-weight: 200;
      letter-spacing: -0.5px;
    }

    .logo span {
      font-weight: 600;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 14px;
      font-weight: 300;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: rgba(255, 255, 255, 0.5);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.3);
      transition: all 0.3s;
    }

    .status-dot.running {
      background: #fff;
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
        transform: scale(1);
      }

      50% {
        opacity: 0.5;
        transform: scale(1.2);
      }
    }

    .container {
      flex: 1;
      display: grid;
      grid-template-columns: 360px 1fr 360px;
      gap: 30px;
      min-height: 0;
      perspective: 1000px;
      margin-bottom: 20px;
    }

    .panel {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transform-style: preserve-3d;
      transition: all 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      position: relative;
      min-height: 0;
    }

    .panel::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(255, 255, 255, 0.1) 0%, transparent 50%);
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }

    .panel:hover::before {
      opacity: 1;
    }

    .panel:hover {
      transform: translateY(-8px);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .panel-header {
      padding: 24px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      font-size: 14px;
      font-weight: 200;
      text-transform: uppercase;
      letter-spacing: 2px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .panel-content {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    .panel-content::-webkit-scrollbar {
      width: 3px;
    }

    .panel-content::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
    }

    .input-group {
      margin-bottom: 20px;
    }

    .label {
      display: block;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 8px;
      font-weight: 300;
    }

    .input {
      width: 100%;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #fff;
      padding: 12px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: all 0.3s;
      cursor: text;
    }

    .input:focus {
      border-color: rgba(255, 255, 255, 0.4);
      background: rgba(0, 0, 0, 0.5);
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.05);
    }

    select.input {
      cursor: pointer;
    }

    .categories {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 20px;
    }

    .cat-item {
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }

    .cat-item::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
      transform: translateX(-100%);
      transition: transform 0.5s;
      pointer-events: none;
    }

    .cat-item:hover::after {
      transform: translateX(100%);
    }

    .cat-item:hover {
      border-color: rgba(255, 255, 255, 0.3);
      transform: translateX(4px);
    }

    .cat-check {
      appearance: none;
      width: 14px;
      height: 14px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      position: relative;
      cursor: pointer;
      transition: all 0.3s;
      flex-shrink: 0;
    }

    .cat-check:checked {
      background: #fff;
      border-color: #fff;
    }

    .cat-check:checked::after {
      content: "";
      position: absolute;
      left: 4px;
      top: 1px;
      width: 4px;
      height: 8px;
      border: solid #000;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
    }

    .cat-label {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.7);
      cursor: pointer;
      user-select: none;
    }

    .option {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .option-label {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.7);
      user-select: none;
    }

    .toggle {
      position: relative;
      width: 40px;
      height: 22px;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: 0.3s;
      border-radius: 11px;
    }

    .toggle-slider:before {
      position: absolute;
      content: "";
      height: 16px;
      width: 16px;
      left: 2px;
      bottom: 2px;
      background: rgba(255, 255, 255, 0.3);
      transition: 0.3s;
      border-radius: 50%;
    }

    input:checked+.toggle-slider {
      background: rgba(255, 255, 255, 0.15);
      border-color: rgba(255, 255, 255, 0.4);
    }

    input:checked+.toggle-slider:before {
      transform: translateX(18px);
      background: #fff;
      box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
    }

    .btn {
      width: 100%;
      background: none;
      border: 1px solid #fff;
      color: #fff;
      padding: 14px;
      font-size: 13px;
      font-weight: 300;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      margin-top: 20px;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }

    .btn::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.3);
      transform: translate(-50%, -50%);
      transition: width 0.6s, height 0.6s;
      pointer-events: none;
    }

    .btn:hover::before {
      width: 300px;
      height: 300px;
    }

    .btn:hover {
      background: #fff;
      color: #000;
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(255, 255, 255, 0.2);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-stop {
      border-color: #ff3b30;
      color: #ff3b30;
      display: none;
    }

    .btn-stop:hover {
      background: #ff3b30;
      color: #fff;
    }

    .btn-ai {
      margin-left: auto;
      padding: 6px 14px;
      background: rgba(138, 43, 226, 0.15);
      border: 1px solid rgba(138, 43, 226, 0.3);
      color: #da70d6;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 1px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.3s;
      border-radius: 4px;
    }

    .btn-ai:hover {
      background: rgba(138, 43, 226, 0.25);
      border-color: rgba(138, 43, 226, 0.5);
    }

    .btn-ai:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .btn-ai .ai-spinner {
      width: 10px;
      height: 10px;
      border: 2px solid rgba(218, 112, 214, 0.3);
      border-top-color: #da70d6;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }

    .btn-ai.loading .ai-spinner {
      display: block;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .req-header {
      display: grid;
      grid-template-columns: 50px 60px 70px 1fr;
      gap: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      font-size: 10px;
      color: rgba(255, 255, 255, 0.4);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
      flex-shrink: 0;
    }

    #reqLog {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .req-row {
      display: grid;
      grid-template-columns: 50px 60px 70px 1fr;
      gap: 12px;
      padding: 8px;
      background: rgba(0, 0, 0, 0.2);
      border-left: 2px solid transparent;
      font-size: 13px;
      transition: all 0.3s;
      opacity: 0;
      animation: fadeIn 0.3s forwards;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
      }
    }

    .req-row:hover {
      transform: translateX(8px);
      background: rgba(255, 255, 255, 0.05);
    }

    .req-row.flagged {
      border-left-color: #ff3b30;
      background: rgba(255, 59, 48, 0.1);
    }

    .req-num {
      color: rgba(255, 255, 255, 0.4);
    }

    .req-status {
      font-weight: 500;
    }

    .s200 {
      color: #34c759;
    }

    .s300 {
      color: #ffcc00;
    }

    .s400 {
      color: #ff9500;
    }

    .s500 {
      color: #ff3b30;
    }

    .req-time {
      color: rgba(255, 255, 255, 0.7);
    }

    .req-payload {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: rgba(255, 255, 255, 0.7);
      user-select: text;
      cursor: text;
    }

    .req-payload.flagged {
      color: #ff3b30;
    }

    .finding {
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.08);
      margin-bottom: 12px;
      cursor: pointer;
      transition: all 0.4s;
      opacity: 0;
      animation: slideIn 0.4s forwards;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .finding:hover {
      transform: translateY(-4px) scale(1.02);
      border-color: rgba(255, 255, 255, 0.2);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
    }

    .finding-head {
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .finding-title {
      font-size: 13px;
      font-weight: 400;
    }

    .sev {
      font-size: 10px;
      padding: 4px 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
      border-radius: 2px;
    }

    .sev-CRITICAL {
      color: #ff3b30;
      border: 1px solid #ff3b30;
      background: rgba(255, 59, 48, 0.1);
    }

    .sev-HIGH {
      color: #ff9500;
      border: 1px solid #ff9500;
      background: rgba(255, 149, 0, 0.1);
    }

    .sev-MEDIUM {
      color: #ffcc00;
      border: 1px solid #ffcc00;
      background: rgba(255, 204, 0, 0.1);
    }

    .sev-LOW {
      color: #34c759;
      border: 1px solid #34c759;
      background: rgba(52, 199, 89, 0.1);
    }

    .sev-INFO {
      color: rgba(255, 255, 255, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .finding-body {
      padding: 16px;
      display: none;
      font-size: 12px;
      line-height: 1.6;
    }

    .finding.expanded .finding-body {
      display: block;
      animation: expand 0.3s;
    }

    @keyframes expand {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    .detail {
      margin-bottom: 10px;
    }

    .detail-label {
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 4px;
      font-size: 11px;
    }

    .detail-value {
      color: rgba(255, 255, 255, 0.8);
      user-select: text;
      cursor: text;
    }

    .fix {
      margin-top: 12px;
      padding: 12px;
      background: rgba(52, 199, 89, 0.1);
      border: 1px solid rgba(52, 199, 89, 0.3);
      font-size: 12px;
      color: #34c759;
      border-radius: 4px;
      user-select: text;
      cursor: text;
    }

    .empty {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: rgba(255, 255, 255, 0.3);
      font-size: 14px;
      font-weight: 200;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      padding-bottom: 40px;
    }

    .stat {
      text-align: center;
      padding: 20px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      transition: all 0.3s;
    }

    .stat:hover {
      transform: translateY(-4px);
      border-color: rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.05);
    }

    .stat-val {
      font-size: 32px;
      font-weight: 200;
      margin-bottom: 4px;
      background: linear-gradient(135deg, #fff, rgba(255, 255, 255, 0.5));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .stat-label {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.4);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* AI Modal */
    #aiModal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 10000;
      background: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(10px);
      align-items: center;
      justify-content: center;
    }

    #aiModal.open {
      display: flex;
    }

    .ai-modal-box {
      background: rgba(10, 10, 20, 0.95);
      border: 1px solid rgba(138, 43, 226, 0.3);
      width: min(860px, 92vw);
      max-height: 88vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 0 80px rgba(138, 43, 226, 0.4);
      animation: modalIn 0.3s;
      border-radius: 8px;
    }

    @keyframes modalIn {
      from {
        opacity: 0;
        transform: scale(0.9);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .ai-modal-head {
      padding: 20px 24px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }

    .ai-modal-title {
      font-size: 16px;
      font-weight: 400;
      letter-spacing: 1px;
      color: #da70d6;
    }

    .ai-overall-risk {
      padding: 4px 12px;
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      border-radius: 4px;
    }

    .risk-Critical {
      background: rgba(255, 59, 48, 0.2);
      color: #ff3b30;
      border: 1px solid #ff3b30;
    }

    .risk-High {
      background: rgba(255, 149, 0, 0.2);
      color: #ff9500;
      border: 1px solid #ff9500;
    }

    .risk-Medium {
      background: rgba(255, 204, 0, 0.15);
      color: #ffcc00;
      border: 1px solid #ffcc00;
    }

    .risk-Low {
      background: rgba(52, 199, 89, 0.15);
      color: #34c759;
      border: 1px solid #34c759;
    }

    .risk-Informational {
      background: rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .ai-modal-close {
      margin-left: auto;
      background: transparent;
      border: none;
      color: rgba(255, 255, 255, 0.5);
      font-size: 24px;
      cursor: pointer;
      line-height: 1;
      transition: color 0.3s;
    }

    .ai-modal-close:hover {
      color: #fff;
    }

    .ai-modal-body {
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .ai-modal-body::-webkit-scrollbar {
      width: 4px;
    }

    .ai-modal-body::-webkit-scrollbar-thumb {
      background: rgba(138, 43, 226, 0.3);
      border-radius: 10px;
    }

    .ai-section-label {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.4);
      margin-bottom: 12px;
      font-weight: 500;
    }

    .ai-summary-text {
      font-size: 13px;
      line-height: 1.8;
      color: rgba(255, 255, 255, 0.85);
      background: rgba(138, 43, 226, 0.08);
      padding: 16px;
      border-left: 3px solid #8a2be2;
      border-radius: 4px;
    }

    .ai-issue-card {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 6px;
      overflow: hidden;
    }

    .ai-issue-head {
      padding: 14px 18px;
      display: grid;
      grid-template-columns: auto 1fr auto auto;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .ai-issue-head:hover {
      background: rgba(255, 255, 255, 0.03);
    }

    .owasp-badge {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 1px;
      padding: 4px 10px;
      text-transform: uppercase;
      background: rgba(138, 43, 226, 0.2);
      border: 1px solid rgba(138, 43, 226, 0.4);
      color: #da70d6;
      border-radius: 3px;
    }

    .ai-issue-title {
      font-size: 13px;
      font-weight: 400;
    }

    .ai-issue-chevron {
      color: rgba(255, 255, 255, 0.4);
      font-size: 16px;
      transition: transform 0.3s;
    }

    .ai-issue-card.expanded .ai-issue-chevron {
      transform: rotate(90deg);
    }

    .ai-issue-body {
      padding: 18px;
      display: none;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
    }

    .ai-issue-card.expanded .ai-issue-body {
      display: block;
    }

    .ai-field {
      margin-top: 14px;
    }

    .ai-field-label {
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.4);
      margin-bottom: 6px;
    }

    .ai-field-text {
      font-size: 12px;
      line-height: 1.7;
      color: rgba(255, 255, 255, 0.8);
    }

    .ai-fix-block {
      padding: 12px 16px;
      background: rgba(52, 199, 89, 0.08);
      border-left: 3px solid #34c759;
      font-size: 12px;
      color: #34c759;
      line-height: 1.7;
      border-radius: 4px;
    }

    .ai-code-block {
      padding: 12px 16px;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.1);
      font-family: 'Courier New', monospace;
      font-size: 11px;
      color: #5ac8fa;
      line-height: 1.6;
      white-space: pre-wrap;
      overflow-x: auto;
      border-radius: 4px;
    }

    .ai-reco-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .ai-reco-item {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 6px;
      font-size: 12px;
      line-height: 1.6;
    }

    .ai-reco-num {
      min-width: 26px;
      height: 26px;
      background: rgba(138, 43, 226, 0.2);
      border: 1px solid rgba(138, 43, 226, 0.4);
      color: #da70d6;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
      flex-shrink: 0;
    }

    .ai-error-box {
      padding: 18px;
      background: rgba(255, 59, 48, 0.08);
      border: 1px solid rgba(255, 59, 48, 0.3);
      color: #ff3b30;
      font-size: 13px;
      line-height: 1.7;
      border-radius: 6px;
    }

    #toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: rgba(0, 0, 0, 0.95);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #fff;
      padding: 12px 20px;
      font-size: 12px;
      z-index: 9998;
      transform: translateY(100px);
      opacity: 0;
      transition: transform 0.3s, opacity 0.3s;
      pointer-events: none;
      border-radius: 6px;
    }

    #toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    #toast.error {
      border-color: #ff3b30;
      color: #ff3b30;
    }
  </style>
</head>

<body>
  <canvas id="canvas"></canvas>
  <div class="cursor"></div>
  <div class="cursor-dot"></div>
  <div class="app">
    <div class="header">
      <div class="logo">Web<span>Fuzz</span></div>
      <div class="status"><span id="statusLabel">Idle</span>
        <div class="status-dot" id="statusDot"></div>
      </div>
    </div>
    <div class="container">
      <div class="panel">
        <div class="panel-header">Configuration</div>
        <div class="panel-content">
          <div class="input-group"><label class="label">Target URL</label><input class="input" id="url"
              placeholder="https://example.com/page"></div>
          <div class="input-group"><label class="label">Parameter</label><input class="input" id="param"
              placeholder="id"></div>
          <div class="input-group"><label class="label">Method</label><select class="input" id="method">
              <option>GET</option>
              <option>POST</option>
            </select></div>
          <div class="input-group"><label class="label">Extra Data</label><input class="input" id="extra"
              placeholder="token=abc"></div>
          <label class="label">Categories</label>
          <div class="categories" id="categories"></div>
          <label class="label">Options</label>
          <div class="option"><span class="option-label">URL Encode</span><label class="toggle"><input type="checkbox"
                id="optEncode"><span class="toggle-slider"></span></label></div>
          <div class="option"><span class="option-label">Mutations</span><label class="toggle"><input type="checkbox"
                id="optMut"><span class="toggle-slider"></span></label></div>
          <div class="input-group"><label class="label">Max per Category</label><input class="input" type="number"
              id="maxCat" value="0"></div>
          <div class="input-group"><label class="label">Delay (s)</label><input class="input" type="number" id="delay"
              value="0" step="0.1"></div>
          <div class="input-group"><label class="label">Timeout (s)</label><input class="input" type="number"
              id="timeout" value="10"></div>
          <button class="btn" id="startBtn" onclick="startScan()">Start Scan</button>
          <button class="btn btn-stop" id="stopBtn" onclick="stopScan()">Stop</button>
        </div>
      </div>
      <div class="panel">
        <div class="panel-header">Results</div>
        <div class="panel-content" id="resultsPanel">
          <div class="req-header"><span>#</span><span>Status</span><span>Time</span><span>Payload</span></div>
          <div id="reqLog">
            <div class="empty">Configure and start scan</div>
          </div>
        </div>
      </div>
      <div class="panel">
        <div class="panel-header">
          Findings
          <button class="btn-ai" id="btnAiInsights" onclick="openAiInsights()">
            <span class="ai-spinner"></span>
            <span class="ai-btn-text">✦ AI Insights</span>
          </button>
        </div>
        <div class="panel-content" id="findings">
          <div class="empty">No findings yet</div>
        </div>
      </div>
    </div>
    <div class="stats">
      <div class="stat">
        <div class="stat-val" id="statSent">0</div>
        <div class="stat-label">Sent</div>
      </div>
      <div class="stat">
        <div class="stat-val" id="statTotal">—</div>
        <div class="stat-label">Total</div>
      </div>
      <div class="stat">
        <div class="stat-val" id="statFindings">0</div>
        <div class="stat-label">Findings</div>
      </div>
      <div class="stat">
        <div class="stat-val" id="statTime">—</div>
        <div class="stat-label">Last Time</div>
      </div>
    </div>
  </div>

  <div id="aiModal" role="dialog" aria-modal="true">
    <div class="ai-modal-box">
      <div class="ai-modal-head">
        <div class="ai-modal-title">✦ AI Insights · Gemini</div>
        <div id="aiOverallRisk" class="ai-overall-risk" style="display:none"></div>
        <button class="ai-modal-close" onclick="closeAiModal()">✕</button>
      </div>
      <div class="ai-modal-body" id="aiModalBody"></div>
    </div>
  </div>

  <div id="toast"></div>

  <script>
    let scene, camera, renderer, particles, mouseX = 0, mouseY = 0;
    function initCanvas() { const c = document.getElementById('canvas'); renderer = new THREE.WebGLRenderer({ canvas: c, alpha: true, antialias: true }); renderer.setSize(window.innerWidth, window.innerHeight); renderer.setPixelRatio(window.devicePixelRatio); scene = new THREE.Scene(); camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000); camera.position.z = 5; const geo = new THREE.BufferGeometry(); const verts = []; const colors = []; for (let i = 0; i < 2000; i++) { const x = (Math.random() - 0.5) * 30; const y = (Math.random() - 0.5) * 30; const z = (Math.random() - 0.5) * 30; verts.push(x, y, z); colors.push(Math.random(), Math.random(), Math.random()) } geo.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3)); geo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3)); const mat = new THREE.PointsMaterial({ size: 0.05, vertexColors: true, transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending }); particles = new THREE.Points(geo, mat); scene.add(particles); const light = new THREE.PointLight(0xffffff, 1, 100); light.position.set(0, 0, 10); scene.add(light); animate() }
    function animate() { requestAnimationFrame(animate); particles.rotation.x += 0.0002; particles.rotation.y += 0.0003; const targetX = (mouseX - window.innerWidth / 2) * 0.001; const targetY = (mouseY - window.innerHeight / 2) * 0.001; particles.rotation.x += (targetY - particles.rotation.x) * 0.05; particles.rotation.y += (targetX - particles.rotation.y) * 0.05; camera.position.x += (mouseX * 0.001 - camera.position.x) * 0.05; camera.position.y += (-mouseY * 0.001 - camera.position.y) * 0.05; camera.lookAt(scene.position); renderer.render(scene, camera) }
    window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight) });
    document.addEventListener('mousemove', (e) => { mouseX = e.clientX; mouseY = e.clientY; document.querySelectorAll('.panel').forEach(panel => { const rect = panel.getBoundingClientRect(); const x = e.clientX - rect.left; const y = e.clientY - rect.top; const percentX = (x / rect.width) * 100; const percentY = (y / rect.height) * 100; panel.style.setProperty('--mouse-x', percentX + '%'); panel.style.setProperty('--mouse-y', percentY + '%') }) });
    initCanvas();

    let evtSource, scanId, stopped = false, sentCount = 0, totalCount = 0, findingsCount = 0;
    let _allFindings = [], _lastStats = {};

    async function init() { const res = await fetch('/api/categories'); const cats = await res.json(); const grid = document.getElementById('categories'); cats.forEach(c => { const item = document.createElement('label'); item.className = 'cat-item'; item.innerHTML = `<input type="checkbox" class="cat-check" value="${c}" checked><span class="cat-label">${c}</span>`; grid.appendChild(item) }) }
    init();

    async function startScan() {
      const url = document.getElementById('url').value.trim(); const param = document.getElementById('param').value.trim(); if (!url || !param) { alert('URL and parameter required'); return }
      const cats = [...document.querySelectorAll('.cat-check:checked')].map(i => i.value); if (!cats.length) { alert('Select at least one category'); return }
      const extraRaw = document.getElementById('extra').value.trim(); const extraData = {}; if (extraRaw) { extraRaw.split(',').forEach(kv => { const [k, v] = kv.trim().split('='); if (k && v) extraData[k.trim()] = v.trim() }) }
      const config = { url, param, method: document.getElementById('method').value, extra_data: extraData, categories: cats, url_encode: document.getElementById('optEncode').checked, mutations: document.getElementById('optMut').checked, max_per_category: parseInt(document.getElementById('maxCat').value) || 0, delay: parseFloat(document.getElementById('delay').value) || 0, timeout: parseFloat(document.getElementById('timeout').value) || 10, random_count: 5 };
      resetUI(); stopped = false; setStatus('running'); document.getElementById('startBtn').disabled = true; document.getElementById('stopBtn').style.display = 'block';
      const r = await fetch('/api/scan', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(config) }); const { scan_id, error } = await r.json(); if (error) { alert(error); setStatus('idle'); return } scanId = scan_id;
      evtSource = new EventSource(`/api/scan/${scan_id}/stream`);
      evtSource.addEventListener('init', e => { const d = JSON.parse(e.data); totalCount = d.total_payloads; document.getElementById('statTotal').textContent = totalCount });
      evtSource.addEventListener('baseline', e => { const d = JSON.parse(e.data); toast(`Baseline: ${d.status_code} · ${d.content_length}B`) });
      evtSource.addEventListener('request', e => { const d = JSON.parse(e.data); sentCount = d.n; addRequest(d); updateStats(d); if (d.findings && d.findings.length) { d.findings.forEach(f => { addFinding(f); _allFindings.push(f) }) } });
      evtSource.addEventListener('done', e => { const d = JSON.parse(e.data); _lastStats = d.stats; setStatus('done'); toast(`Complete · ${d.stats.findings} finding(s)`); scanFinished() });
      evtSource.addEventListener('error_event', e => { const d = JSON.parse(e.data); toast('Error: ' + d.message, true); setStatus('error'); scanFinished() });
      evtSource.addEventListener('close', () => { evtSource.close(); if (!stopped) scanFinished() });
      evtSource.onerror = () => { if (!stopped) { setStatus('error'); scanFinished() } };
    }

    function stopScan() { stopped = true; if (evtSource) evtSource.close(); setStatus('idle'); scanFinished(); toast('Stopped') }
    function scanFinished() { document.getElementById('startBtn').disabled = false; document.getElementById('stopBtn').style.display = 'none' }
    function resetUI() { sentCount = totalCount = findingsCount = 0; _allFindings = []; _lastStats = {}; document.getElementById('statSent').textContent = '0'; document.getElementById('statTotal').textContent = '—'; document.getElementById('statFindings').textContent = '0'; document.getElementById('statTime').textContent = '—'; document.getElementById('reqLog').innerHTML = ''; document.getElementById('findings').innerHTML = '' }
    function setStatus(s) { document.getElementById('statusDot').className = `status-dot ${s}`; document.getElementById('statusLabel').textContent = s.charAt(0).toUpperCase() + s.slice(1) }
    function updateStats(d) { document.getElementById('statSent').textContent = d.n; document.getElementById('statTime').textContent = d.response_time.toFixed(2) + 's' }

    function addRequest(d) {
      const log = document.getElementById('reqLog');
      const panel = document.getElementById('resultsPanel');
      if (log.querySelector('.empty')) log.innerHTML = '';

      const flagged = d.findings && d.findings.length > 0;
      const row = document.createElement('div');
      row.className = `req-row ${flagged ? 'flagged' : ''}`;
      const sClass = d.status_code < 300 ? 's200' : d.status_code < 400 ? 's300' : d.status_code < 500 ? 's400' : 's500';
      row.innerHTML = `<span class="req-num">${d.n}</span><span class="req-status ${sClass}">${d.status_code || 'ERR'}</span><span class="req-time">${d.response_time.toFixed(2)}s</span><span class="req-payload ${flagged ? 'flagged' : ''}">${escHtml(d.payload)}</span>`;
      log.appendChild(row);

      // Auto-scroll to bottom
      requestAnimationFrame(() => {
        panel.scrollTop = panel.scrollHeight;
      });
    }

    function addFinding(f) {
      findingsCount++; document.getElementById('statFindings').textContent = findingsCount;
      const list = document.getElementById('findings'); if (list.querySelector('.empty')) list.innerHTML = '';
      const card = document.createElement('div'); card.className = 'finding'; card.innerHTML = `<div class="finding-head" onclick="this.parentElement.classList.toggle('expanded')"><span class="finding-title">${escHtml(f.vuln_type)}</span><span class="sev sev-${f.severity}">${f.severity}</span></div><div class="finding-body"><div class="detail"><div class="detail-label">Payload</div><div class="detail-value">${escHtml(f.payload)}</div></div><div class="detail"><div class="detail-label">Reason</div><div class="detail-value">${escHtml(f.reason)}</div></div><div class="detail"><div class="detail-label">Explanation</div><div class="detail-value">${escHtml(f.explanation)}</div></div><div class="fix">${escHtml(f.fix)}</div></div>`;
      list.insertBefore(card, list.firstChild)
    }

    function escHtml(s) { if (!s) return ''; return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;') }
    function toast(msg, isError = false) { const el = document.getElementById('toast'); el.textContent = msg; el.className = 'show' + (isError ? ' error' : ''); clearTimeout(el._t); el._t = setTimeout(() => el.className = '', 3500) }

    async function openAiInsights() {
      const btn = document.getElementById('btnAiInsights');
      btn.classList.add('loading'); btn.disabled = true;
      showAiModal('<div class="empty" style="padding:40px;text-align:center;color:rgba(255,255,255,0.5);"><div style="font-size:32px;margin-bottom:16px;animation:spin 1s linear infinite">✦</div><div>Gemini is analyzing your scan results…</div></div>');
      try {
        const resp = await fetch('/api/ai-insights', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ findings: _allFindings, stats: _lastStats }) });
        const data = await resp.json();
        if (data.error) { renderAiError(data.error) } else { renderAiInsights(data) }
      } catch (err) { renderAiError('Network error: ' + err.message) } finally { btn.classList.remove('loading'); btn.disabled = false }
    }

    function showAiModal(innerHtml) { document.getElementById('aiModalBody').innerHTML = innerHtml; document.getElementById('aiOverallRisk').style.display = 'none'; document.getElementById('aiModal').classList.add('open') }
    function closeAiModal() { document.getElementById('aiModal').classList.remove('open') }
    document.getElementById('aiModal').addEventListener('click', function (e) { if (e.target === this) closeAiModal() });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeAiModal() });

    function renderAiError(msg) { document.getElementById('aiModalBody').innerHTML = `<div class="ai-error-box">⚠ ${escHtml(msg)}</div>` }
    function renderAiInsights(data) {
      const riskEl = document.getElementById('aiOverallRisk');
      riskEl.textContent = (data.overall_risk || 'Unknown').toUpperCase();
      riskEl.className = `ai-overall-risk risk-${data.overall_risk || 'Informational'}`;
      riskEl.style.display = 'block';
      let html = `<div><div class="ai-section-label">Executive Summary</div><div class="ai-summary-text">${escHtml(data.summary || 'No summary provided.')}</div></div>`;
      if (data.key_issues && data.key_issues.length > 0) {
        html += `<div><div class="ai-section-label">Key Issues (${data.key_issues.length})</div><div style="display:flex;flex-direction:column;gap:12px;">`;
        data.key_issues.forEach((issue, i) => {
          const riskClass = `sev-${issue.risk_level ? issue.risk_level.toUpperCase() : 'INFO'}`;
          html += `<div class="ai-issue-card" id="ai-issue-${i}">
        <div class="ai-issue-head" onclick="toggleAiIssue(${i})">
          <span class="owasp-badge" title="${escHtml(issue.owasp_name || '')}">${escHtml(issue.owasp_code || '?')}</span>
          <span class="ai-issue-title">${escHtml(issue.title || 'Unknown Issue')}</span>
          <span class="sev ${riskClass}">${escHtml(issue.risk_level || '?')}</span>
          <span class="ai-issue-chevron">›</span>
        </div>
        <div class="ai-issue-body">
          <div class="ai-field"><div class="ai-field-label">OWASP Category</div><div class="ai-field-text"><strong style="color:#da70d6">${escHtml(issue.owasp_code || '')}:</strong> ${escHtml(issue.owasp_name || '')}</div></div>
          <div class="ai-field"><div class="ai-field-label">Explanation</div><div class="ai-field-text">${escHtml(issue.explanation || '')}</div></div>
          <div class="ai-field"><div class="ai-field-label">Remediation</div><div class="ai-fix-block">💡 ${escHtml(issue.fix || '')}</div></div>
          ${issue.code_snippet ? `<div class="ai-field"><div class="ai-field-label">Safe Code Example</div><pre class="ai-code-block">${escHtml(issue.code_snippet)}</pre></div>` : ''}
        </div>
      </div>`;
        });
        html += `</div></div>`;
      } else { html += `<div><div class="ai-section-label">Key Issues</div><div style="color:#34c759;font-size:13px;padding:12px 0">✓ No significant issues found.</div></div>` }
      if (data.recommendations && data.recommendations.length > 0) {
        html += `<div><div class="ai-section-label">Recommendations</div><div class="ai-reco-list">`;
        data.recommendations.forEach((r, i) => { html += `<div class="ai-reco-item"><span class="ai-reco-num">${i + 1}</span><span>${escHtml(r)}</span></div>` });
        html += `</div></div>`;
      }
      html += `<div style="text-align:center;color:rgba(255,255,255,0.3);font-size:10px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.08)">Analysis powered by <strong style="color:#da70d6">Google Gemini</strong> · OWASP Top 10 (2021)</div>`;
      document.getElementById('aiModalBody').innerHTML = html;
    }
    function toggleAiIssue(i) { const card = document.getElementById(`ai-issue-${i}`); if (card) card.classList.toggle('expanded') }
  </script>
</body>

</html>
